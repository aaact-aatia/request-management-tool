name: Build and push container image to GHCR

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_WEBAPP_NAME_DEV: ${{ vars.AZURE_WEBAPP_NAME_DEV }}
      AZURE_WEBAPP_NAME_PROD: ${{ vars.AZURE_WEBAPP_NAME_PROD }}
      AZURE_CLIENT_ID: ${{ secrets.AZUREAPPSERVICE_CLIENTID || secrets.AZUREAPPSERVICE_CLIENTID_8808B0DB8D7142538A762B63809F54F8 }}
      AZURE_TENANT_ID: ${{ secrets.AZUREAPPSERVICE_TENANTID || secrets.AZUREAPPSERVICE_TENANTID_24543EE9DED84AE599E00F3855DFB8C3 }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID || secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB9A2EB06BD5474C85B1B0A02D18F408 }}

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/request-management-tool:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/request-management-tool:${{ steps.tag.outputs.tag }}-${{ github.sha }}

      - name: Resolve restart target and validate Azure config
        id: restart
        if: github.ref_name == 'dev' || github.ref_name == 'main'
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            target_app="$AZURE_WEBAPP_NAME_PROD"
          else
            target_app="$AZURE_WEBAPP_NAME_DEV"
          fi

          if [ -n "$AZURE_RESOURCE_GROUP" ] && [ -n "$target_app" ] && [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "target_app=$target_app" >> "$GITHUB_OUTPUT"
            echo "Azure restart enabled for $target_app in resource group $AZURE_RESOURCE_GROUP"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Azure restart is skipped. Configure AZURE_RESOURCE_GROUP, AZURE_WEBAPP_NAME_DEV, AZURE_WEBAPP_NAME_PROD, and Azure login secrets to enable automatic App Service restart."
          fi

      - name: Log in to Azure for App Service restart
        if: (github.ref_name == 'dev' || github.ref_name == 'main') && steps.restart.outputs.enabled == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ env.AZURE_CLIENT_ID }}
          tenant-id: ${{ env.AZURE_TENANT_ID }}
          subscription-id: ${{ env.AZURE_SUBSCRIPTION_ID }}

      - name: Restart Azure App Service for branch environment
        if: (github.ref_name == 'dev' || github.ref_name == 'main') && steps.restart.outputs.enabled == 'true'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "${{ steps.restart.outputs.target_app }}"