name: Build and push container image to GHCR

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "tag=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/request-management-tool:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/request-management-tool:${{ steps.tag.outputs.tag }}-${{ github.sha }}

      - name: Log in to Azure for dev restart
        if: github.ref_name == 'dev'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_8808B0DB8D7142538A762B63809F54F8 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_24543EE9DED84AE599E00F3855DFB8C3 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_DB9A2EB06BD5474C85B1B0A02D18F408 }}

      - name: Restart Azure dev App Service
        if: github.ref_name == 'dev'
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp restart \
              --resource-group GcDc-SSC_ICTAccess_Project-rg \
              --name GcDc-SSC-ICTAccess-Linux-aaact-rmt-dev-asv