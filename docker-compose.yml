services:
  web:
    build: .
    container_name: aaact-web
    ports:
      - "${PORT}:80"
    depends_on:
      - db
    volumes:
      - ./app:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      TZ: ${TZ}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      GCNOTIFY_API_KEY: ${GCNOTIFY_API_KEY:-}
      GCNOTIFY_TEMPLATE_ID: ${GCNOTIFY_TEMPLATE_ID:-}
      GCNOTIFY_TEST_EMAIL: ${GCNOTIFY_TEST_EMAIL:-}

  db:
    image: mysql:5.7
    container_name: aaact-rmt-db
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_HOST: ${DB_HOST}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - dbdata:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/reference.sql:/docker-entrypoint-initdb.d/02-reference.sql
      - ./database/session_handler.sql:/docker-entrypoint-initdb.d/03-session_handler.sql
      - ./database/ssc-sample-dev.sql:/docker-entrypoint-initdb.d/04-sample-dev.sql

volumes:
  dbdata:
  vendor_data:
