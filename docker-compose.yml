services:
  web:
    build: .
    container_name: aaact-web
    ports:
      - "${PORT}:80"
    depends_on:
      - db
    volumes:
      - ./app:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_BASE_URL: ${APP_BASE_URL:-}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      TZ: ${TZ}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      NOTIFY_MODE: ${NOTIFY_MODE:-}
      NOTIFY_REDIRECT_FORCE_OVERRIDE: ${NOTIFY_REDIRECT_FORCE_OVERRIDE:-}
      NOTIFY_OVERRIDE_EMAIL: ${NOTIFY_OVERRIDE_EMAIL:-}
      NOTIFY_OVERRIDE_CLIENT_EMAIL: ${NOTIFY_OVERRIDE_CLIENT_EMAIL:-}
      NOTIFY_OVERRIDE_INTERNAL_EMAIL: ${NOTIFY_OVERRIDE_INTERNAL_EMAIL:-}
      GCNOTIFY_API_KEY: ${GCNOTIFY_API_KEY:-}
      GCNOTIFY_TEMPLATE_ID: ${GCNOTIFY_TEMPLATE_ID:-}
      GCNOTIFY_TEST_EMAIL: ${GCNOTIFY_TEST_EMAIL:-}
      GCNOTIFY_CURL_CA_BUNDLE: ${GCNOTIFY_CURL_CA_BUNDLE:-}
      GCNOTIFY_CURL_INSECURE: ${GCNOTIFY_CURL_INSECURE:-}
      GCNOTIFY_TEMPLATE_REQUEST_TEAM_EN: ${GCNOTIFY_TEMPLATE_REQUEST_TEAM_EN:-}
      GCNOTIFY_TEMPLATE_REQUEST_TEAM_FR: ${GCNOTIFY_TEMPLATE_REQUEST_TEAM_FR:-}
      GCNOTIFY_TEMPLATE_REQUEST_AFTERFACT_TEAM_EN: ${GCNOTIFY_TEMPLATE_REQUEST_AFTERFACT_TEAM_EN:-}
      GCNOTIFY_TEMPLATE_REQUEST_AFTERFACT_TEAM_FR: ${GCNOTIFY_TEMPLATE_REQUEST_AFTERFACT_TEAM_FR:-}
      GCNOTIFY_TEMPLATE_REQUEST_AAACT: ${GCNOTIFY_TEMPLATE_REQUEST_AAACT:-}
      GCNOTIFY_TEMPLATE_REQUEST_CLIENT_EN: ${GCNOTIFY_TEMPLATE_REQUEST_CLIENT_EN:-}
      GCNOTIFY_TEMPLATE_REQUEST_CLIENT_FR: ${GCNOTIFY_TEMPLATE_REQUEST_CLIENT_FR:-}
      GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_TEAM_EN: ${GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_TEAM_EN:-}
      GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_TEAM_FR: ${GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_TEAM_FR:-}
      GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_CLIENT_EN: ${GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_CLIENT_EN:-}
      GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_CLIENT_FR: ${GCNOTIFY_TEMPLATE_REQUEST_DEFAULT_CLIENT_FR:-}
      GCNOTIFY_TEMPLATE_RESOLVED_TEAM_EN: ${GCNOTIFY_TEMPLATE_RESOLVED_TEAM_EN:-}
      GCNOTIFY_TEMPLATE_RESOLVED_TEAM_FR: ${GCNOTIFY_TEMPLATE_RESOLVED_TEAM_FR:-}
      GCNOTIFY_TEMPLATE_RESOLVED_CLIENT_EN: ${GCNOTIFY_TEMPLATE_RESOLVED_CLIENT_EN:-}
      GCNOTIFY_TEMPLATE_RESOLVED_CLIENT_FR: ${GCNOTIFY_TEMPLATE_RESOLVED_CLIENT_FR:-}
      GCNOTIFY_TEMPLATE_STATUS_CHANGED_CLIENT_EN: ${GCNOTIFY_TEMPLATE_STATUS_CHANGED_CLIENT_EN:-}
      GCNOTIFY_TEMPLATE_STATUS_CHANGED_CLIENT_FR: ${GCNOTIFY_TEMPLATE_STATUS_CHANGED_CLIENT_FR:-}
      GCNOTIFY_TEMPLATE_REASSIGNED_TEAM_EN: ${GCNOTIFY_TEMPLATE_REASSIGNED_TEAM_EN:-}
      GCNOTIFY_TEMPLATE_REASSIGNED_TEAM_FR: ${GCNOTIFY_TEMPLATE_REASSIGNED_TEAM_FR:-}
      GCNOTIFY_TEMPLATE_REASSIGNED_CLIENT_EN: ${GCNOTIFY_TEMPLATE_REASSIGNED_CLIENT_EN:-}
      GCNOTIFY_TEMPLATE_REASSIGNED_CLIENT_FR: ${GCNOTIFY_TEMPLATE_REASSIGNED_CLIENT_FR:-}

  db:
    image: mysql:5.7
    container_name: aaact-rmt-db
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_HOST: ${DB_HOST}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - dbdata:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/reference.sql:/docker-entrypoint-initdb.d/02-reference.sql
      - ./database/session_handler.sql:/docker-entrypoint-initdb.d/03-session_handler.sql
      - ./database/ssc-sample-dev.sql:/docker-entrypoint-initdb.d/04-sample-dev.sql

volumes:
  dbdata:
  vendor_data:
